/* ══════════════════════════════════════════════
   FIREBASE REALTIME DATABASE — SSE LISTENER
══════════════════════════════════════════════ */
const FIREBASE_URL = "https://aspirasi-9d974-default-rtdb.asia-southeast1.firebasedatabase.app";

let dbState = {
  ka_asps: [],
  ka_pasp: [],
  ka_pcmt: []
};

let _rtReady = false; // sudah dapat data pertama kali?

// Konversi object Firebase → Array bersih
function toArray(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val;
  if (typeof val === 'object') return Object.values(val).filter(item => item !== null);
  return [];
}

// Simpan ke Firebase (fire-and-forget)
function dbSet(k, v) {
  dbState[k] = toArray(v);
  fetch(`${FIREBASE_URL}/${k}.json`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(Array.isArray(v) ? v : toArray(v))
  }).catch(e => console.error("Gagal menyimpan ke Firebase:", e));
}

function dbGet(k, fb) {
  return Array.isArray(dbState[k]) ? dbState[k] : (fb || []);
}

// ── Firebase: render langsung, fetch data di background ──
let _sseConnected = false;
let _pollingInterval = null;

function startRealtimeListener() {
  // SSE untuk realtime update
  try {
    const es = new EventSource(`${FIREBASE_URL}/.json`);
    es.addEventListener('put', (e) => {
      try {
        const payload = JSON.parse(e.data);
        _sseConnected = true;
        updateConnStatus(true);
        applyFirebasePayload(payload);
      } catch (err) {}
    });
    es.onerror = () => {
      _sseConnected = false;
      updateConnStatus(false);
      es.close();
    };
  } catch(e) {}

  // Polling setiap 6 detik sebagai realtime fallback
  _pollingInterval = setInterval(() => pollFirebase(), 6000);
}

async function pollFirebase() {
  try {
    const r = await fetch(`${FIREBASE_URL}/.json`);
    const data = await r.json();
    if (!data) return;
    const newAsps = toArray(data.ka_asps).map(normalizeAsp).filter(Boolean);
    const newPasp = toArray(data.ka_pasp).map(normalizeAsp).filter(Boolean);
    const newPcmt = toArray(data.ka_pcmt);
    if (_rtReady) {
      const prevIds = new Set(dbState.ka_asps.map(a => String(a.id)));
      const added = newAsps.filter(a => !prevIds.has(String(a.id)));
      if (added.length > 0) showToast(`✨ ${added.length} aspirasi baru tersedia!`, 'info');
      const prevPendingIds = new Set(dbState.ka_pasp.map(a => String(a.id)));
      const addedPending = newPasp.filter(a => !prevPendingIds.has(String(a.id)));
      if (addedPending.length > 0 && state.isAdmin) showToast(`📥 ${addedPending.length} aspirasi masuk, menunggu moderasi`, 'warn');
    }
    dbState.ka_asps = newAsps;
    dbState.ka_pasp = newPasp;
    dbState.ka_pcmt = newPcmt;
    _rtReady = true;
    updateConnStatus(true);
    render();
  } catch(e) {
    updateConnStatus(false);
  }
}

function applyFirebasePayload(payload) {
  if (payload.path === '/') {
    const data = payload.data || {};
    const newAsps = toArray(data.ka_asps).map(normalizeAsp).filter(Boolean);
    const newPasp = toArray(data.ka_pasp).map(normalizeAsp).filter(Boolean);
    const newPcmt = toArray(data.ka_pcmt);
    if (_rtReady) {
      const prevIds = new Set(dbState.ka_asps.map(a => String(a.id)));
      const added = newAsps.filter(a => !prevIds.has(String(a.id)));
      if (added.length > 0) showToast(`✨ ${added.length} aspirasi baru tersedia!`, 'info');
      const prevPendingIds = new Set(dbState.ka_pasp.map(a => String(a.id)));
      const addedPending = newPasp.filter(a => !prevPendingIds.has(String(a.id)));
      if (addedPending.length > 0 && state.isAdmin) showToast(`📥 ${addedPending.length} aspirasi masuk, menunggu moderasi`, 'warn');
    }
    dbState.ka_asps = newAsps;
    dbState.ka_pasp = newPasp;
    dbState.ka_pcmt = newPcmt;
    _rtReady = true;
  } else {
    const key = payload.path.replace('/', '');
    if (dbState[key] !== undefined) {
      const newVal = toArray(payload.data).map(normalizeAsp).filter(Boolean);
      if (_rtReady && key === 'ka_asps') {
        const prevIds = new Set(dbState.ka_asps.map(a => String(a.id)));
        const added = newVal.filter(a => !prevIds.has(String(a.id)));
        if (added.length > 0) showToast(`✨ ${added.length} aspirasi baru tersedia!`, 'info');
      }
      dbState[key] = newVal;
    }
  }
  render();
}

function updateConnStatus(ok) {
  const el = document.getElementById('conn-dot');
  if (!el) return;
  el.style.background = ok ? '#22c55e' : '#f59e0b';
  el.title = ok ? 'Realtime terhubung' : 'Menghubungkan ulang…';
}

/* ── Per-device like/vote tracking via localStorage ── */
function _getLikedSet()  { try { return new Set(JSON.parse(localStorage.getItem('ka_liked')||'[]')); } catch(e){ return new Set(); } }
function _getVoteMap()   { try { return JSON.parse(localStorage.getItem('ka_votes')||'{}'); } catch(e){ return {}; } }
function _saveLikedSet(s){ localStorage.setItem('ka_liked', JSON.stringify([...s])); }
function _saveVoteMap(m) { localStorage.setItem('ka_votes', JSON.stringify(m)); }

// Normalisasi data aspirasi dari Firebase — pastikan semua field ada
function normalizeAsp(a) {
  if (!a) return null;
  const likedSet = _getLikedSet();
  const voteMap  = _getVoteMap();
  const id = String(a.id || '');
  return {
    ...a,
    likes: a.likes || 0,
    likedByMe: likedSet.has(id),
    myVote: voteMap[id] || null,
    votes: { setuju: (a.votes&&a.votes.setuju)||0, tidak: (a.votes&&a.votes.tidak)||0 },
    comments: Array.isArray(a.comments) ? a.comments : [],
    status: a.status || 'open',
    category: a.category || 'Lainnya',
    author: a.author || 'Anonim',
    message: a.message || '',
    time: a.time || '',
    role: a.role || 'Siswa',
    id,
  };
}

function getAsps(){ return dbGet('ka_asps',[]).map(normalizeAsp).filter(Boolean); }
function saveAsps(d){ dbSet('ka_asps',d); }
function getPendingAsp(){ return dbGet('ka_pasp',[]).map(normalizeAsp).filter(Boolean); }
function savePendingAsp(d){ dbSet('ka_pasp',d); }
function getPendingCmt(){ return dbGet('ka_pcmt',[]); }
function savePendingCmt(d){ dbSet('ka_pcmt',d); }

let _toastTimer;
function showToast(msg, type='success'){
  const el=document.getElementById('toast-el');
  if(!el)return;
  const colors={success:['#18181b','#fff'],warn:['#fffbeb','#854d0e'],info:['#eff6ff','#1d4ed8']};
  const [bg,fg]=colors[type]||colors.info;
  el.textContent=msg;
  el.style.cssText=`position:fixed;top:20px;right:20px;z-index:9999;padding:11px 16px;border-radius:9px;font-weight:500;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,0.15);font-family:inherit;max-width:320px;background:${bg};color:${fg};border:1px solid ${bg==='#fff'?'#e4e4e7':bg};animation:toastIn 0.2s ease;display:block;`;
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{ el.style.display='none'; },2600);
}

/* btn style helper — same as React S.btn */
function btn(variant='primary', size='md'){
  const pad = size==='sm'?'6px 12px': size==='lg'?'12px 22px':'8px 16px';
  const fs  = size==='sm'?12: size==='lg'?14:13;
  const base=`display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:8px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.15s;line-height:1;padding:${pad};font-size:${fs}px;`;
  const variants={
    primary:`background:#18181b;color:#fff;border:1px solid #18181b;`,
    ghost:`background:transparent;color:#71717a;border:1px solid #e4e4e7;`,
    danger:`background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;`,
    success:`background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;`,
    active:`background:#18181b;color:#fff;border:1px solid #18181b;`,
    outline:`background:#fff;color:#18181b;border:1px solid #e4e4e7;`,
  };
  return `style="${base}${variants[variant]||variants.primary}"`;
}

  state.showPw=false;
  document.getElementById('pwInput').type='password';

}

function togglePw(){
  state.showPw=!state.showPw;
  document.getElementById('pwInput').type=state.showPw?'text':'password';
  document.getElementById('eyeBtn').innerHTML=I.eye(state.showPw);
}
function doLogin(){
  const val=document.getElementById('pwInput').value;
  if(val===ADMIN_PASSWORD){
    state.isAdmin=true;
    closeLogin();
    showToast('Masuk sebagai Admin OSIS','success');
    render();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('pwInput').style.border='1px solid #fca5a5';
    document.getElementById('pwInput').style.background='#fef2f2';
  }
}
function doLogout(){

function handleLike(id){
  const sid = String(id);
  const likedSet = _getLikedSet();
  const asps = getAsps();
  const a = asps.find(x=>String(x.id)===sid); if(!a)return;

  if(likedSet.has(sid)){
    likedSet.delete(sid);
    a.likes = Math.max(0, a.likes - 1);
    _saveLikedSet(likedSet);
    showToast('Suka dibatalkan','info');
    _animateLikeBtn(sid, false);
  } else {
    likedSet.add(sid);
    a.likes++;
    _saveLikedSet(likedSet);
    showToast('\u2764\ufe0f Aspirasi disukai','success');
    _animateLikeBtn(sid, true);
  }
  const toSave = asps.map(x => { const {likedByMe, myVote, ...rest}=x; return rest; });
  saveAsps(toSave); render();
}

function _animateLikeBtn(id, isLike){
  setTimeout(()=>{
    const btn = document.querySelector('[data-likebtn="'+id+'"]');
    if(!btn) return;
    const rect = btn.getBoundingClientRect();
    const el = document.createElement('div');
    el.textContent = isLike ? '+1' : '-1';
    el.style.cssText = 'position:fixed;left:'+(rect.left+rect.width/2)+'px;top:'+rect.top+'px;transform:translateX(-50%);font-size:13px;font-weight:700;color:'+(isLike?'#ef4444':'#71717a')+';pointer-events:none;z-index:9999;animation:floatUp 0.8s ease forwards;';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 800);
  }, 0);
}

function handleVote(id,type){
  const sid = String(id);
  const voteMap = _getVoteMap();
  const asps = getAsps();
  const a = asps.find(x=>String(x.id)===sid); if(!a)return;
  const pv = voteMap[sid] || null;

  if(pv===type){
    a.votes[type] = Math.max(0, a.votes[type] - 1);
    delete voteMap[sid];
    _saveVoteMap(voteMap);
    showToast('Suara dibatalkan','info');
  } else {
    if(pv){ a.votes[pv] = Math.max(0, a.votes[pv] - 1); }
    a.votes[type]++;
    voteMap[sid] = type;
    _saveVoteMap(voteMap);
    showToast(type==='setuju'?'\ud83d\udc4d Kamu mendukung aspirasi ini':'\ud83d\udc4e Kamu tidak mendukung aspirasi ini', type==='setuju'?'success':'info');
  }
  const toSave = asps.map(x => { const {likedByMe, myVote, ...rest}=x; return rest; });
  saveAsps(toSave); render();
}

function handleSubmit(){
  const msg = state.formMessage.trim();
  if(!msg){ showToast('Tulis pesan terlebih dahulu','warn'); return; }
  const newAsp={
    id: uid(),
    author: state.formAnonymous ? 'Anonim' : 'Siswa',
    role: 'Siswa',
    category: state.formCategory,
    message: msg,
    likes:0, votes:{setuju:0,tidak:0},
    time: 'Baru saja',
    likedByMe:false, myVote:null, status:'open', comments:[]
  };
  const pending=getPendingAsp();
  pending.push(newAsp);
  savePendingAsp(pending);
  state.formMessage='';
  state.formCategory='Fasilitas';
  state.formAnonymous=true;
  state.showForm=false;
  showToast('Aspirasi dikirim — menunggu persetujuan admin','success');
  render();
}

function handleAddComment(aspId){
  const text=(state.cmtInputs[aspId]||'').trim();
  if(!text){ showToast('Tulis komentar terlebih dahulu','warn'); return; }
  const isAnon = state.cmtAnon[aspId]!==false;
  const newCmt={id:uid(), aspId:String(aspId), author:isAnon?'Anonim':'Siswa', text, time:'Baru saja'};
  const pending=getPendingCmt();
  pending.push(newCmt);
  savePendingCmt(pending);
  state.cmtInputs[aspId]='';
  showToast('Komentar dikirim — menunggu persetujuan admin','success');
  render();
}

/* ══════════════════════════════════════════════
   ADMIN ACTIONS
══════════════════════════════════════════════ */
function adminApproveAsp(id){
  const pending=getPendingAsp();
  const asp=pending.find(a=>String(a.id)===String(id)); if(!asp)return;
  savePendingAsp(pending.filter(a=>String(a.id)!==String(id)));
  const asps=getAsps(); asps.unshift(asp); saveAsps(asps);
  showToast('Aspirasi disetujui','success'); render();
}
function adminRejectAsp(id){
  savePendingAsp(getPendingAsp().filter(a=>String(a.id)!==String(id)));
  showToast('Aspirasi ditolak','warn'); render();
}
function adminApproveCmt(cid){
  const pending=getPendingCmt();
  const cmt=pending.find(c=>String(c.id)===String(cid)); if(!cmt)return;
  savePendingCmt(pending.filter(c=>String(c.id)!==String(cid)));
  const asps=getAsps();
  const a=asps.find(x=>String(x.id)===String(cmt.aspId)); if(!a)return;
  a.comments.push(cmt); saveAsps(asps);
  showToast('Komentar disetujui','success'); render();
}
function adminRejectCmt(cid){
  savePendingCmt(getPendingCmt().filter(c=>String(c.id)!==String(cid)));
  showToast('Komentar ditolak','warn'); render();
}
function adminUpdateStatus(id,s){
  const asps=getAsps();
  const a=asps.find(x=>String(x.id)===String(id)); if(!a)return;
  a.status=s; saveAsps(asps);
  showToast('Status diperbarui','success'); render();
}
function adminDeleteAsp(id){
  if(!confirm('Hapus aspirasi ini?'))return;
  saveAsps(getAsps().filter(a=>String(a.id)!==String(id)));
  showToast('Aspirasi dihapus','warn'); render();
}
function adminDeleteCmt(aid,cid){
  const asps=getAsps();
  const a=asps.find(x=>String(x.id)===String(aid)); if(!a)return;
  a.comments=a.comments.filter(c=>String(c.id)!==String(cid));
  saveAsps(asps); showToast('Komentar dihapus','warn'); render();
}

/* btn style as inline string (without the style="" wrapper) */
function _btnStyle(variant='primary', size='md'){
  const pad=size==='sm'?'6px 12px':size==='lg'?'12px 22px':'8px 16px';
  const fs=size==='sm'?12:size==='lg'?14:13;
  const base=`display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:8px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.15s;line-height:1;padding:${pad};font-size:${fs}px;border:none;`;
  const variants={
    primary:'background:#18181b;color:#fff;border:1px solid #18181b;',
    ghost:'background:transparent;color:#71717a;border:1px solid #e4e4e7;',
    danger:'background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;',
    success:'background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;',
    active:'background:#18181b;color:#fff;border:1px solid #18181b;',
    outline:'background:#fff;color:#18181b;border:1px solid #e4e4e7;',
  };
  return base+(variants[variant]||variants.primary);
}

window.onerror = function(msg, src, line) {
  const d = document.createElement('div');
  d.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#fef2f2;color:#b91c1c;font-size:11px;padding:8px 12px;z-index:9999;font-family:monospace;border-top:2px solid #fca5a5;';
  d.textContent = `ERROR baris ${line}: ${msg}`;
  document.body.appendChild(d);
};

function initApp() {
  _rtReady = true;
  render();

  fetch(`${FIREBASE_URL}/.json`)
    .then(r => r.json())
    .then(data => {
      if (data) {
        dbState.ka_asps = toArray(data.ka_asps).map(normalizeAsp).filter(Boolean);
        dbState.ka_pasp = toArray(data.ka_pasp).map(normalizeAsp).filter(Boolean);
        dbState.ka_pcmt = toArray(data.ka_pcmt);
        render();
      }
    })
    .catch(() => {});

  startRealtimeListener();
}

initApp();
</script>
</body>
</html>

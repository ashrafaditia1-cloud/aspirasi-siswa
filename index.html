/* ══════════════════════════════════════════════
   FIREBASE REALTIME DATABASE — SSE LISTENER
══════════════════════════════════════════════ */
const FIREBASE_URL = "https://aspirasi-9d974-default-rtdb.asia-southeast1.firebasedatabase.app";

let dbState = {
  ka_asps: [],
  ka_pasp: [],
  ka_pcmt: []
};

let _rtReady = false; // sudah dapat data pertama kali?

// Konversi object Firebase → Array bersih
function toArray(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val;
  if (typeof val === 'object') return Object.values(val).filter(item => item !== null);
  return [];
}

// Simpan ke Firebase (fire-and-forget)
function dbSet(k, v) {
  dbState[k] = toArray(v);
  fetch(`${FIREBASE_URL}/${k}.json`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(Array.isArray(v) ? v : toArray(v))
  }).catch(e => console.error("Gagal menyimpan ke Firebase:", e));
}

function dbGet(k, fb) {
  return Array.isArray(dbState[k]) ? dbState[k] : (fb || []);
}

// ── Realtime: coba SSE dulu, fallback ke polling kalau diblokir ──
let _sseConnected = false;
let _pollingInterval = null;
let _sseFailTimer = null;

function startRealtimeListener() {
  // Coba SSE dulu
  try {
    const es = new EventSource(`${FIREBASE_URL}/.json`);

    // Kalau SSE tidak dapat event dalam 6 detik → anggap diblokir, pakai polling
    _sseFailTimer = setTimeout(() => {
      es.close();
      startPolling();
    }, 6000);

    es.addEventListener('put', (e) => {
      clearTimeout(_sseFailTimer); // SSE berhasil, batalkan timer polling
      try {
        const payload = JSON.parse(e.data);
        _sseConnected = true;
        updateConnStatus(true);
        applyFirebasePayload(payload);
      } catch (err) {}
    });

    es.addEventListener('patch', (e) => {
      clearTimeout(_sseFailTimer);
      try {
        const payload = JSON.parse(e.data);
        const data = payload.data || {};
        Object.keys(data).forEach(k => {
          if (dbState[k] !== undefined) dbState[k] = toArray(data[k]);
        });
        if (typeof render === 'function') render();
      } catch(err) {}
    });

    es.onerror = () => {
      clearTimeout(_sseFailTimer);
      _sseConnected = false;
      updateConnStatus(false);
      es.close();
      // Fallback ke polling
      startPolling();
    };

  } catch(e) {
    startPolling();
  }
}

function applyFirebasePayload(payload) {
  if (payload.path === '/') {
    const data = payload.data || {};
    const newAsps = toArray(data.ka_asps);
    const newPasp = toArray(data.ka_pasp);
    const newPcmt = toArray(data.ka_pcmt);

    if (_rtReady) {
      const prevIds = new Set(dbState.ka_asps.map(a => String(a.id)));
      const added = newAsps.filter(a => !prevIds.has(String(a.id)));
      if (added.length > 0) showToast(`✨ ${added.length} aspirasi baru tersedia!`, 'info');

      const prevPendingIds = new Set(dbState.ka_pasp.map(a => String(a.id)));
      const addedPending = newPasp.filter(a => !prevPendingIds.has(String(a.id)));
      if (addedPending.length > 0 && state.isAdmin) showToast(`📥 ${addedPending.length} aspirasi masuk, menunggu moderasi`, 'warn');
    }

    dbState.ka_asps = newAsps;
    dbState.ka_pasp = newPasp;
    dbState.ka_pcmt = newPcmt;
    _rtReady = true;
  } else {
    const key = payload.path.replace('/', '');
    if (dbState[key] !== undefined) {
      const newVal = toArray(payload.data);
      if (_rtReady && key === 'ka_asps') {
        const prevIds = new Set(dbState.ka_asps.map(a => String(a.id)));
        const added = newVal.filter(a => !prevIds.has(String(a.id)));
        if (added.length > 0) showToast(`✨ ${added.length} aspirasi baru tersedia!`, 'info');
      }
      dbState[key] = newVal;
    }
  }
  if (typeof render === 'function') render();
}

// Polling setiap 5 detik sebagai fallback kalau SSE diblokir (misal Brave)
function startPolling() {
  if (_pollingInterval) return; // sudah jalan
  updateConnStatus(true); // polling juga dianggap "terhubung"
  _pollingInterval = setInterval(async () => {
    try {
      const r = await fetch(`${FIREBASE_URL}/.json`);
      if (!r.ok) throw new Error();
      const data = await r.json();
      if (!data) return;

      const newAsps = toArray(data.ka_asps);
      const newPasp = toArray(data.ka_pasp);
      const newPcmt = toArray(data.ka_pcmt);

      if (_rtReady) {
        const prevIds = new Set(dbState.ka_asps.map(a => String(a.id)));
        const added = newAsps.filter(a => !prevIds.has(String(a.id)));
        if (added.length > 0) showToast(`✨ ${added.length} aspirasi baru tersedia!`, 'info');

        const prevPendingIds = new Set(dbState.ka_pasp.map(a => String(a.id)));
        const addedPending = newPasp.filter(a => !prevPendingIds.has(String(a.id)));
        if (addedPending.length > 0 && state.isAdmin) showToast(`📥 ${addedPending.length} aspirasi masuk, menunggu moderasi`, 'warn');
      }

      dbState.ka_asps = newAsps;
      dbState.ka_pasp = newPasp;
      dbState.ka_pcmt = newPcmt;
      _rtReady = true;
      updateConnStatus(true);
      if (typeof render === 'function') render();
    } catch(e) {
      updateConnStatus(false);
    }
  }, 5000);
}

function showToast(msg, type='success'){

  const colors={success:['#18181b','#fff'],warn:['#fffbeb','#854d0e'],info:['#eff6ff','#1d4ed8']};
  const [bg,fg]=colors[type]||colors.info;
  el.textContent=msg;
  el.style.cssText=`position:fixed;top:20px;right:20px;z-index:9999;padding:11px 16px;border-radius:9px;font-weight:500;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,0.15);font-family:inherit;max-width:320px;background:${bg};color:${fg};border:1px solid ${bg==='#fff'?'#e4e4e7':bg};animation:toastIn 0.2s ease;display:block;`;
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{ el.style.display='none'; },2600);
}

/* btn style helper — same as React S.btn */
function btn(variant='primary', size='md'){
  const pad = size==='sm'?'6px 12px': size==='lg'?'12px 22px':'8px 16px';
  const fs  = size==='sm'?12: size==='lg'?14:13;
  const base=`display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:8px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.15s;line-height:1;padding:${pad};font-size:${fs}px;`;
  const variants={
    primary:`background:#18181b;color:#fff;border:1px solid #18181b;`,
    ghost:`background:transparent;color:#71717a;border:1px solid #e4e4e7;`,
    danger:`background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;`,
    success:`background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;`,
    active:`background:#18181b;color:#fff;border:1px solid #18181b;`,
    outline:`background:#fff;color:#18181b;border:1px solid #e4e4e7;`,
  };
  return `style="${base}${variants[variant]||variants.primary}"`;
}

}

  const a=asps.find(x=>String(x.id)===String(id)); if(!a)return;
  const pv=a.myVote;
  if(pv===type){ a.votes[type]--; a.myVote=null; showToast('Suara dibatalkan','info'); }
  else { if(pv){a.votes[pv]--;} a.votes[type]++; a.myVote=type; showToast(type==='setuju'?'Kamu mendukung aspirasi ini':'Kamu tidak mendukung aspirasi ini',type==='setuju'?'success':'info'); }
  saveAsps(asps); render();
}

function handleSubmit(){
  const msg = state.formMessage.trim();
  if(!msg){ showToast('Tulis pesan terlebih dahulu','warn'); return; }
  const newAsp={
    id: uid(),
    author: state.formAnonymous ? 'Anonim' : 'Siswa',
    role: 'Siswa',
    category: state.formCategory,
    message: msg,
    likes:0, votes:{setuju:0,tidak:0},
    time: 'Baru saja',
    likedByMe:false, myVote:null, status:'open', comments:[]
  };
  const pending=getPendingAsp();
  pending.push(newAsp);
  savePendingAsp(pending);
  state.formMessage='';
  state.formCategory='Fasilitas';
  state.formAnonymous=true;
  state.showForm=false;
  showToast('Aspirasi dikirim — menunggu persetujuan admin','success');
  render();
}

function handleAddComment(aspId){
  const text=(state.cmtInputs[aspId]||'').trim();
  if(!text){ showToast('Tulis komentar terlebih dahulu','warn'); return; }
  const isAnon = state.cmtAnon[aspId]!==false;
  const newCmt={id:uid(), aspId:String(aspId), author:isAnon?'Anonim':'Siswa', text, time:'Baru saja'};
  const pending=getPendingCmt();
  pending.push(newCmt);
  savePendingCmt(pending);
  state.cmtInputs[aspId]='';
  showToast('Komentar dikirim — menunggu persetujuan admin','success');
  render();
}

/* ══════════════════════════════════════════════
   ADMIN ACTIONS
══════════════════════════════════════════════ */
function adminApproveAsp(id){
  const pending=getPendingAsp();
  const asp=pending.find(a=>String(a.id)===String(id)); if(!asp)return;
  savePendingAsp(pending.filter(a=>String(a.id)!==String(id)));
  const asps=getAsps(); asps.unshift(asp); saveAsps(asps);
  showToast('Aspirasi disetujui','success'); render();
}
function adminRejectAsp(id){
  savePendingAsp(getPendingAsp().filter(a=>String(a.id)!==String(id)));
  showToast('Aspirasi ditolak','warn'); render();
}
function adminApproveCmt(cid){
  const pending=getPendingCmt();
  const cmt=pending.find(c=>String(c.id)===String(cid)); if(!cmt)return;
  savePendingCmt(pending.filter(c=>String(c.id)!==String(cid)));
  const asps=getAsps();
  const a=asps.find(x=>String(x.id)===String(cmt.aspId)); if(!a)return;
  a.comments.push(cmt); saveAsps(asps);
  showToast('Komentar disetujui','success'); render();
}
function adminRejectCmt(cid){
  savePendingCmt(getPendingCmt().filter(c=>String(c.id)!==String(cid)));
  showToast('Komentar ditolak','warn'); render();
}
function adminUpdateStatus(id,s){
  const asps=getAsps();
  const a=asps.find(x=>String(x.id)===String(id)); if(!a)return;
  a.status=s; saveAsps(asps);
  showToast('Status diperbarui','success'); render();
}
function adminDeleteAsp(id){
  if(!confirm('Hapus aspirasi ini?'))return;
  saveAsps(getAsps().filter(a=>String(a.id)!==String(id)));
  showToast('Aspirasi dihapus','warn'); render();
}
function adminDeleteCmt(aid,cid){
  const asps=getAsps();
  const a=asps.find(x=>String(x.id)===String(aid)); if(!a)return;
  a.comments=a.comments.filter(c=>String(c.id)!==String(cid));
  saveAsps(asps); showToast('Komentar dihapus','warn'); render();
}

    return `

      <p style="font-size:14px;line-height:1.7;color:#18181b;margin-bottom:14px;">${esc(asp.message)}</p>
      <!-- Vote bar -->
      ${voteBar}
      <!-- Actions -->
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;border-top:1px solid #f4f4f5;padding-top:12px;">
        <button onclick="handleLike('${asp.id}')" class="bp" style="${_btnStyle(asp.likedByMe?'active':'ghost','sm')}color:${asp.likedByMe?'#fff':'#71717a'};">
          ${I.heart(asp.likedByMe)} ${asp.likes}

        <button onclick="handleVote('${asp.id}','setuju')" class="bp" style="${_btnStyle(asp.myVote==='setuju'?'active':'ghost','sm')}color:${asp.myVote==='setuju'?'#fff':'#71717a'};">
          ${I.thumbUp(asp.myVote==='setuju')} Setuju
        </button>
        <button onclick="handleVote('${asp.id}','tidak')" class="bp" style="${_btnStyle(asp.myVote==='tidak'?'active':'ghost','sm')}color:${asp.myVote==='tidak'?'#fff':'#71717a'};">
          ${I.thumbDn(asp.myVote==='tidak')} Tidak
        </button>
        <button onclick="toggleCmt('${asp.id}')" class="bp" style="${_btnStyle(showCmt?'active':'ghost','sm')}margin-left:auto;color:${showCmt?'#fff':'#71717a'};">
          ${I.comment} ${asp.comments.length} ${showCmt?I.chevUp:I.chevDn}
        </button>

  }).join('');

  return `
  <!-- Sticky nav -->
  <div style="background:#fff;border-bottom:1px solid #e4e4e7;position:sticky;top:0;z-index:100;">
    <div style="max-width:780px;margin:0 auto;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:30px;height:30px;border-radius:7px;background:#18181b;display:flex;align-items:center;justify-content:center;color:#fff;">${I.logo}</div>
        <div>
          <span style="font-weight:700;font-size:15px;letter-spacing:-0.3px;">Kotak Aspirasi</span>
          <span style="font-size:12px;color:#a1a1aa;margin-left:8px;">OSIS</span>
        </div>
        <span id="conn-dot" title="Menghubungkan…" style="width:7px;height:7px;border-radius:99px;background:${_sseConnected?'#22c55e':'#f59e0b'};display:inline-block;margin-left:4px;flex-shrink:0;transition:background 0.3s;"></span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button onclick="state.showForm=!state.showForm;render()" class="bp" ${btn('primary','sm')}>${I.plus} Tulis Aspirasi</button>
        <button onclick="openLogin()" class="bp" style="${_btnStyle('ghost','sm')}position:relative;">
          ${I.shield}
          ${totalPending>0?`<span style="position:absolute;top:-5px;right:-5px;background:#ef4444;border-radius:99px;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;line-height:1;">${totalPending}</span>`:''}
        </button>
      </div>
    </div>
  </div>

  <!-- Page header -->
  <div style="background:#fff;border-bottom:1px solid #f4f4f5;">
    <div style="max-width:780px;margin:0 auto;padding:28px 24px 24px;">
      <h1 style="font-size:22px;font-weight:700;letter-spacing:-0.5px;margin-bottom:6px;">Aspirasi Siswa</h1>
      <p style="font-size:14px;color:#71717a;margin-bottom:20px;">Sampaikan aspirasimu. Setiap masukan ditinjau dan ditindaklanjuti oleh OSIS.</p>
      <div style="display:flex;gap:20px;flex-wrap:wrap;">${statsRow}</div>
    </div>
  </div>

  <!-- Main content -->
  <div style="max-width:780px;margin:0 auto;padding:24px;">
    <!-- Notice -->
    <div style="background:#fff;border:1px solid #e4e4e7;border-radius:8px;padding:11px 14px;margin-bottom:16px;font-size:12px;color:#52525b;display:flex;align-items:center;gap:8px;">
      ${I.bell}
      Setiap aspirasi dan komentar akan ditinjau oleh Admin OSIS sebelum ditampilkan ke publik.
    </div>

    ${formHtml}

    <!-- Toolbar -->
    <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
      <div style="flex:1 1 200px;position:relative;">
        <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#a1a1aa;display:flex;">${I.search}</span>

    <!-- Cards -->

    <!-- Footer -->

/* btn style as inline string (without the style="" wrapper) */
function _btnStyle(variant='primary', size='md'){
  const pad=size==='sm'?'6px 12px':size==='lg'?'12px 22px':'8px 16px';
  const fs=size==='sm'?12:size==='lg'?14:13;
  const base=`display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:8px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.15s;line-height:1;padding:${pad};font-size:${fs}px;border:none;`;
  const variants={
    primary:'background:#18181b;color:#fff;border:1px solid #18181b;',
    ghost:'background:transparent;color:#71717a;border:1px solid #e4e4e7;',
    danger:'background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;',
    success:'background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;',
    active:'background:#18181b;color:#fff;border:1px solid #18181b;',
    outline:'background:#fff;color:#18181b;border:1px solid #e4e4e7;',
  };
  return base+(variants[variant]||variants.primary);
}

/* ══════════════════════════════════════════════
   UI HELPERS
══════════════════════════════════════════════ */
function setCat(cat){ state.activeCategory=cat; render(); }
function setAdminTab(t){ state.adminTab=t; render(); }
function toggleCmt(id){ const k=String(id); state.expandedCmt[k]=!state.expandedCmt[k]; render(); }

/* ══════════════════════════════════════════════
   MAIN RENDER
══════════════════════════════════════════════ */
function render(){
  document.getElementById('app').innerHTML = state.isAdmin ? renderAdmin() : renderPublic();
}

/* ══════════════════════════════════════════════
   INIT — Fast fetch dulu, lalu SSE realtime
══════════════════════════════════════════════ */
document.getElementById('app').innerHTML = `
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;color:#a1a1aa;font-family:inherit;">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="animation:spin 1s linear infinite;">
      <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
    </svg>
    <div id="load-msg" style="font-size:13px;">Memuat data…</div>
  </div>`;

// Timeout 4 detik — kalau Firebase tidak response, render kosong dulu
const loadTimeout = setTimeout(() => {
  _rtReady = true;
  render();
  showToast('Koneksi lambat, mencoba lagi…', 'warn');
}, 4000);

// Langkah 1: Fetch data awal via REST → render segera
const controller = new AbortController();
const fetchTimer = setTimeout(() => controller.abort(), 5000);

fetch(`${FIREBASE_URL}/.json`, { signal: controller.signal })
  .then(r => {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(data => {
    clearTimeout(loadTimeout);
    clearTimeout(fetchTimer);
    if (data) {
      dbState.ka_asps = toArray(data.ka_asps);
      dbState.ka_pasp = toArray(data.ka_pasp);
      dbState.ka_pcmt = toArray(data.ka_pcmt);
    }
    _rtReady = true;
    render();
  })
  .catch(() => {
    clearTimeout(loadTimeout);
    clearTimeout(fetchTimer);
    _rtReady = true;
    render();
    showToast('Gagal terhubung ke Firebase. Cek koneksi internet.', 'warn');
  });

// Langkah 2: SSE realtime (berjalan paralel)
startRealtimeListener();
</script>
